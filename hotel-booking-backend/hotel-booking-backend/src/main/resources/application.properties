# =============================================
# APPLICATION SETTINGS
# =============================================

# App runs on port 8080 by default
server.port=8080

# =============================================
# DATABASE SETTINGS (H2 In-Memory Database)
# No installation needed! Data resets on restart.
# =============================================

spring.datasource.url=jdbc:h2:mem:hoteldb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (visit http://localhost:8080/h2-console to see your database)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# LOGGING
# =============================================
logging.level.com.hotel=DEBUG
